# Hytale Panel - Nginx reverse proxy configuration
# Replace PANEL_DOMAIN with your actual domain (e.g., panel.dirt.haus)
#
# Note: install.sh also drops /etc/nginx/conf.d/upgrade.conf with the
# $connection_upgrade map needed by proxy_set_header below.

server {
    listen 80;
    listen [::]:80;
    server_name PANEL_DOMAIN;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name PANEL_DOMAIN;

    # SSL managed by Certbot (paths added by `certbot --nginx`)
    # ssl_certificate /etc/letsencrypt/live/PANEL_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/PANEL_DOMAIN/privkey.pem;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com; font-src https://fonts.gstatic.com; connect-src 'self' wss:; img-src 'self' data:;" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        # $connection_upgrade comes from the map in conf.d/upgrade.conf:
        # only sets Connection: upgrade when the client actually upgrades,
        # otherwise closes — without this every plain GET fails as a bad
        # websocket request.
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;

        # Limit upload size
        client_max_body_size 500M;
    }
}
